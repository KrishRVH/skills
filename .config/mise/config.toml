min_version = "2026.3.11"

[settings]
lockfile = true

[tools]
bun = "1.3.14"
gitleaks = "8.30.1"
lychee = "0.24.2"
typos = "1.48.0"

[tasks.install]
description = "Install pinned project tools and dependencies"
run = "mise install && bun install --frozen-lockfile"

[tasks.lock]
description = "Refresh project lockfiles"
run = "mise lock && bun install"

[tasks.tasks]
description = "List available project tasks"
run = "mise tasks"

[tasks.secrets]
description = "Scan the working tree for secrets"
run = "gitleaks dir . --redact --no-banner"

[tasks."skills:test"]
description = "Run the skill-validator test suite"
depends = ["_install"]
run = "bun run skills:test"

[tasks."skills:check"]
description = "Validate skill packages and portable contracts"
depends = ["_install", "skills:test"]
run = "bun run skills:check"

[tasks._install]
hide = true
run = "bun install --frozen-lockfile"

[tasks._links]
hide = true
run = "lychee --root-dir \"$PWD\" --offline --extensions md ."

[tasks._typos]
hide = true
run = "typos --config typos.toml ."

[tasks.standards]
description = "Format and lint-fix Markdown"
depends = ["_install"]
run = "bun run standards"

[tasks."standards:check"]
description = "Run repository quality checks"
depends = ["_install", "_links", "_typos", "secrets", "skills:check"]
run = "bun run standards:check"
